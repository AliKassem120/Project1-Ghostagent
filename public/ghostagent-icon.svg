<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f0a2e" />
    </linearGradient>
    <linearGradient id="ghost-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <linearGradient id="ghost-glow" x1="256" y1="60" x2="256" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.15" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg-grad)" />
  
  <!-- Subtle glow behind ghost -->
  <circle cx="256" cy="240" r="140" fill="#818cf8" opacity="0.08" filter="url(#glow)" />

  <!-- Ghost body -->
  <path
    d="M256 76C188 76 132 132 132 200V380C132 386 137 391 143 391H185C185 391 204 352 224 352C244 352 256 391 256 391C256 391 268 352 288 352C308 352 327 391 327 391H369C375 391 380 386 380 380V200C380 132 324 76 256 76Z"
    fill="url(#ghost-glow)"
    stroke="url(#ghost-grad)"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Left eye -->
  <circle cx="210" cy="210" r="28" fill="url(#ghost-grad)" />
  <circle cx="202" cy="202" r="9" fill="white" opacity="0.7" />
  
  <!-- Right eye -->
  <circle cx="302" cy="210" r="28" fill="url(#ghost-grad)" />
  <circle cx="294" cy="202" r="9" fill="white" opacity="0.7" />

  <!-- Smile -->
  <path
    d="M216 290C216 290 232 314 256 314C280 314 296 290 296 290"
    stroke="url(#ghost-grad)"
    stroke-width="8"
    stroke-linecap="round"
  />
</svg>
